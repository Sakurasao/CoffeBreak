<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kasir Station - Sabar Coffee</title>
    <link rel="icon" type="image/x-icon" href="../Asset/favicon.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../css/kasir.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-brand fixed-top shadow-sm no-print">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img
            src="../Asset/logo.jpeg"
            alt="Logo"
            width="40"
            height="40"
            class="me-2"
            style="
              border-radius: 50%;
              border: 2px solid rgba(255, 255, 255, 0.8);
            "
          />
          SABAR COFFEE
          <small class="fw-light ms-2 text-white-50 d-none d-sm-inline"
            >| Cashier Station</small
          >
        </a>
        <div class="text-white text-end d-flex align-items-center">
          <div class="fw-bold fs-5 me-3" id="real-time-clock">00:00:00</div>
          <div class="small text-white-50">
            <i class="bi bi-circle-fill text-success me-1"></i> Live
            <span id="sync-indicator" class="text-success ms-1">●</span>
          </div>
        </div>
      </div>
    </nav>

    <div class="container main-kasir-view pb-5">
      <div id="kasir-list" class="row justify-content-center"></div>
    </div>

    <div id="print-area">
      <div class="text-center">
        <h5 class="fw-bold m-0">SABAR COFFEE</h5>
        <p style="font-size: 12px">Sidoarjo, Jawa Timur</p>
        <p style="font-size: 11px" id="r-date-time"></p>
      </div>
      <div class="d-print-flex" style="font-size: 12px">
        <span>No: <strong id="r-queue"></strong></span>
        <span>Kasir: Sabar</span>
      </div>
      <div class="r-divider"></div>
      <table style="width: 100%; font-size: 12px">
        <tbody id="r-items"></tbody>
      </table>
      <div class="r-divider"></div>
      <div class="d-print-flex">
        <span>TOTAL</span><span id="r-total"></span>
      </div>
      <div class="d-print-flex">
        <span>TUNAI</span><span id="r-cash"></span>
      </div>
      <div class="d-print-flex" style="font-weight: bold">
        <span>KEMBALI</span><span id="r-change"></span>
      </div>
      <div class="r-divider"></div>
      <div class="text-center mt-3" style="font-size: 10px">
        <p>"Sabar itu Kopi, Nikmat itu Pasti"<br />Terima Kasih!</p>
      </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/kasir.js"></script>
  </body>
</html>
