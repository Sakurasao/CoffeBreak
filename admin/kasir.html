<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kasir - Sabar Coffee</title>
    <link rel="icon" type="image/x-icon" href="../Asset/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root { --brand: #c85a2e; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .card-unpaid { border-left: 5px solid #dc3545; border-radius: 15px; }
        .btn-pay { background: #198754; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark"><i class="bi bi-cash-stack me-2 text-success"></i>Layar Kasir</h2>
        <span class="badge bg-danger">Menunggu Pembayaran</span>
    </div>

    <div id="unpaid-list" class="row g-3">
        </div>
</div>

<script>
    const apiBaseUrl = "https://sakurasao-coffebreakapi.hf.space";

    async function loadUnpaidOrders() {
        const res = await fetch(`${apiBaseUrl}/admin/transactions`);
        const data = await res.json();
        const list = document.getElementById('unpaid-list');
        
        // Filter hanya yang statusnya Unpaid
        const unpaid = data.filter(o => o.status === 'Unpaid');

        if(unpaid.length === 0) {
            list.innerHTML = '<div class="text-center py-5"><h5>Semua sudah bayar! 😎</h5></div>';
            return;
        }

        list.innerHTML = unpaid.map(order => `
            <div class="col-md-6 col-lg-4">
                <div class="card card-unpaid shadow-sm mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="fw-bold mb-0">#${order.queue_number}</h5>
                            <span class="fw-bold text-danger">Rp ${order.total_price.toLocaleString()}</span>
                        </div>
                        <ul class="small text-muted list-unstyled border-top pt-2">
                            ${order.order_items.map(it => `<li>${it.quantity}x ${it.products.name}</li>`).join('')}
                        </ul>
                        <div class="d-flex gap-2 mt-2">
                            <button class="btn btn-outline-danger w-50" onclick="cancelOrder(${order.id}, '${order.queue_number}')">
                                <i class="bi bi-trash me-1"></i> Batal
                            </button>
                            <button class="btn btn-pay w-50" onclick="processPayment(${order.id})">
                                <i class="bi bi-check-lg me-1"></i> Bayar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function processPayment(id) {
        if(!confirm("Sudah terima uang dari pelanggan?")) return;
        await fetch(`${apiBaseUrl}/admin/confirm-payment/${id}`, { method: 'PATCH' });
        loadUnpaidOrders();
    }

    async function cancelOrder(id, num) {
        if(!confirm(`Hapus pesanan #${num} dan kembalikan stok?`)) return;
        try {
            const res = await fetch(`${apiBaseUrl}/admin/cancel-order/${id}`, { method: 'DELETE' });
            if(res.ok) {
                alert(`Pesanan #${num} berhasil dihapus.`);
                loadUnpaidOrders();
            }
        } catch (err) {
            alert("Gagal menghapus pesanan.");
        }
    }

    setInterval(loadUnpaidOrders, 5000);
    loadUnpaidOrders();
</script>
</body>
</html>
