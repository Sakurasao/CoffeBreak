<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Barista Station - Sabar Coffee</title>
    <link rel="icon" type="image/x-icon" href="../Asset/favicon.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="../css/barista.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-brand fixed-top shadow-sm">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img
            src="../Asset/logo.jpeg"
            alt="Logo"
            width="40"
            height="40"
            class="me-2"
            style="
              border-radius: 50%;
              border: 2px solid rgba(255, 255, 255, 0.8);
            "
          />
          SABAR COFFEE
          <small class="fw-light ms-2 text-white-50 d-none d-sm-inline"
            >| Barista Station</small
          >
        </a>
        <div class="text-white text-end d-flex align-items-center">
          <div
            id="status-badge"
            class="badge bg-white text-brand px-3 py-2 rounded-pill shadow-sm me-3"
          >
            Sistem Aktif
          </div>
          <div class="small text-white-50 fw-medium">
            Sync <span id="sync-indicator" class="text-success ms-1">●</span>
          </div>
        </div>
      </div>
    </nav>

    <div class="container pb-5">
      <div class="mb-4 text-center text-md-start">
        <h3 class="fw-bold text-dark mb-1">
          <i class="bi bi-cup-hot-fill me-2 text-brand"></i>Antrean Dapur
        </h3>
        <p class="text-muted small">
          Pesanan yang sudah dilunaskan di kasir otomatis muncul di sini.
          (Urutan #1 prioritas)
        </p>
      </div>
      <div id="barista-list" class="row g-4"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/barista.js"></script>
  </body>
</html>
