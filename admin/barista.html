<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Barista Station - Sabar Coffee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root { --brand: #c85a2e; }
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .order-card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .queue-number { font-size: 2.5rem; font-weight: 800; color: var(--brand); }
        .btn-finish { background: var(--brand); color: white; font-weight: bold; padding: 10px 20px; border-radius: 50px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-cup-hot-fill me-2"></i>Barista Station</h2>
        <span class="badge bg-dark">Real-time Updates</span>
    </div>

    <div id="barista-list" class="row g-4">
        </div>
</div>

<script>
    const apiBaseUrl = 'https://sakurasao-coffebreakapi.hf.space';

    async function loadPendingOrders() {
        // Ambil transaksi, filter yang statusnya 'Pending' saja
        const res = await fetch(`${apiBaseUrl}/admin/transactions`);
        const data = await res.json();
        const list = document.getElementById('barista-list');
        
        const pending = data.filter(o => o.status === 'Pending');

        if(pending.length === 0) {
            list.innerHTML = '<div class="text-center py-5"><h4 class="text-muted">Belum ada antrean baru.</h4></div>';
            return;
        }

        list.innerHTML = pending.map(order => `
            <div class="col-md-4">
                <div class="card order-card h-100">
                    <div class="card-body text-center">
                        <div class="text-muted small">Nomor Antrean</div>
                        <div class="queue-number">${order.queue_number}</div>
                        <hr>
                        <ul class="text-start list-unstyled mb-4">
                            ${order.order_items.map(it => `
                                <li class="mb-2">
                                    <span class="badge bg-secondary me-2">${it.quantity}x</span>
                                    <strong>${it.products.name}</strong>
                                </li>
                            `).join('')}
                        </ul>
                        <button class="btn btn-finish w-100" onclick="finishOrder(${order.id}, '${order.queue_number}')">
                            <i class="bi bi-check2-circle me-1"></i> Selesaikan & Panggil
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function finishOrder(id, num) {
        if(!confirm(`Selesaikan antrean ${num}?`)) return;
        
        await fetch(`${apiBaseUrl}/admin/order-complete/${id}`, { method: 'PATCH' });
        
        // Simulasi suara panggilan (opsional tapi keren)
        const msg = new SpeechSynthesisUtterance(`Pesanan nomor ${num} sudah selesai. Silakan diambil.`);
        msg.lang = 'id-ID';
        window.speechSynthesis.speak(msg);

        loadPendingOrders(); // Refresh list
    }

    // Cek pesanan baru setiap 10 detik
    setInterval(loadPendingOrders, 10000);
    loadPendingOrders();
</script>
</body>
</html>
