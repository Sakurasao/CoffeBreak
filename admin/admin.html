<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard - Sabar Coffee</title>
    <link rel="icon" type="image/x-icon" href="../Asset/favicon.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../css/admin.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark shadow-sm">
      <div
        class="container-fluid px-4 d-flex justify-content-between align-items-center"
      >
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img
            src="../Asset/logo.jpeg"
            alt=""
            width="45"
            height="45"
            class="me-3"
            style="
              border-radius: 50%;
              border: 2px solid rgba(255, 255, 255, 0.8);
            "
          />
          SABAR COFFEE
          <small class="fw-light ms-2 text-white-50"
            >| Management Dashboard</small
          >
        </a>
        <div class="text-white text-end">
          <div class="fw-bold fs-5" id="clock">00:00:00</div>
          <div class="small text-white-50">
            Admin Online
            <span id="sync-indicator" class="text-success ms-1">●</span>
          </div>
        </div>
      </div>
    </nav>

    <div class="admin-wrapper">
      <div class="sidebar">
        <div class="sidebar-brand">
          <img
            src="../Asset/logo.jpeg"
            alt=""
            width="70"
            height="70"
            class="mb-3 shadow"
            style="border-radius: 50%; border: 3px solid #fff"
          />
          <h6 class="m-0 fw-bold">ADMIN PANEL</h6>
        </div>
        <div class="nav flex-column nav-pills mt-4">
          <button
            class="nav-link active"
            id="tab-transactions"
            data-bs-toggle="pill"
            data-bs-target="#content-transactions"
          >
            <i class="bi bi-clock-history me-2"></i> Riwayat Transaksi
          </button>
          <button
            class="nav-link"
            id="tab-stock"
            data-bs-toggle="pill"
            data-bs-target="#content-stock"
          >
            <i class="bi bi-boxes me-2"></i> Manajemen Stok
          </button>
          <button
            class="nav-link"
            id="tab-report"
            data-bs-toggle="pill"
            data-bs-target="#content-report"
          >
            <i class="bi bi-graph-up-arrow me-2"></i> Laporan Penjualan
          </button>
        </div>
      </div>

      <main class="main-content">
        <div class="tab-content">
          <div class="tab-pane fade show active" id="content-transactions">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h3 class="fw-bold m-0 text-dark">Riwayat Transaksi</h3>
              <button
                class="btn btn-brand btn-sm px-4"
                onclick="forceRefresh()"
              >
                <i class="bi bi-arrow-clockwise me-1"></i> Refresh
              </button>
            </div>
            <div id="transaction-groups"></div>
          </div>

          <div class="tab-pane fade" id="content-stock">
            <h3 class="fw-bold mb-4">Stok & Menu</h3>
            <div id="stock-list" class="row g-4"></div>
          </div>

          <div class="tab-pane fade" id="content-report">
            <h3 class="fw-bold mb-4">Laporan Penjualan</h3>
            <div class="row align-items-stretch g-3 mb-4">
              <div class="col-md-6">
                <div
                  class="card-stock h-100 p-4 text-center border-top border-brand border-4"
                >
                  <span class="text-muted small" id="stat-total-label"
                    >Total Pendapatan (Tahun Ini)</span
                  >
                  <h1 class="fw-bold text-brand mt-2" id="stat-total-revenue">
                    Rp 0
                  </h1>
                </div>
              </div>
              <div class="col-md-6">
                <div class="card-stock h-100 p-4 border-top border-brand border-4">
                  <div class="row g-2 align-items-center h-100">
                    <div class="col-6">
                      <label for="report-year" class="form-label small mb-1">Tahun</label>
                      <select id="report-year" class="form-select form-select-sm"></select>
                    </div>
                    <div class="col-6">
                      <label for="report-month" class="form-label small mb-1">Bulan</label>
                      <select id="report-month" class="form-select form-select-sm">
                        <option value="all">Semua Bulan</option>
                        <option value="1">Januari</option>
                        <option value="2">Februari</option>
                        <option value="3">Maret</option>
                        <option value="4">April</option>
                        <option value="5">Mei</option>
                        <option value="6">Juni</option>
                        <option value="7">Juli</option>
                        <option value="8">Agustus</option>
                        <option value="9">September</option>
                        <option value="10">Oktober</option>
                        <option value="11">November</option>
                        <option value="12">Desember</option>
                      </select>
                    </div>
                  </div>
                  <div class="mt-3 text-end">
                    <button class="btn btn-brand btn-sm px-4" id="btn-report-refresh">Terapkan</button>
                  </div>
                </div>
              </div>
            </div>
            <div class="card-stock p-4">
              <div style="height: 350px"><canvas id="salesChart"></canvas></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
  </body>
</html>
