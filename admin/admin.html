<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard - Sabar Coffee</title>
    <link rel="icon" type="image/x-icon" href="../Asset/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --brand: #c85a2e; }
        
        /* Layout Dasar */
        body { 
            background-color: #f8f9fa; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; /* Mencegah body utama di-scroll */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- FIXED NAVBAR --- */
        .navbar { 
            background-color: var(--brand) !important; 
            height: 70px;
            z-index: 1030;
            flex-shrink: 0;
        }

        /* --- WRAPPER UTAMA --- */
        .admin-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden; /* Penting untuk memisahkan scroll */
        }

        /* --- FIXED SIDEBAR --- */
        .sidebar { 
            width: 260px;
            background: #fff;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .sidebar-brand {
            background: var(--brand);
            padding: 20px;
            text-align: center;
            color: #fff;
        }

        .nav-link { 
            color: #444; 
            padding: 15px 20px; 
            border-radius: 0; 
            transition: 0.2s;
            border-left: 4px solid transparent;
        }
        .nav-link:hover { background: #f1f1f1; color: var(--brand); }
        .nav-link.active { 
            background: #fff5f2; 
            color: var(--brand) !important; 
            font-weight: bold;
            border-left-color: var(--brand);
        }

        /* --- SCROLLABLE CONTENT --- */
        .main-content {
            flex: 1;
            overflow-y: auto; /* Hanya area ini yang bisa di-scroll */
            padding: 30px;
            background: #f8f9fa;
        }

        /* --- UI CARDS (ROUNDED & CLEAN) --- */
        .card { 
            border: none; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .card-header { 
            background: #fff; 
            border-bottom: 1px solid #eee; 
            padding: 15px 20px; 
            font-weight: bold;
            border-radius: 15px 15px 0 0 !important;
        }

        /* Badge Status */
        .status-online { font-size: 0.75rem; color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="../Asset/logo.jpeg" alt="Logo" width="40" height="40" class="rounded-circle me-3 border border-white">
            <span>SABAR COFFEE <small class="fw-light ms-2 text-white-50">| Management Dashboard</small></span>
        </a>
        <div class="text-white text-end">
            <div class="fw-bold" id="clock">00:00:00</div>
            <div class="status-online"><i class="bi bi-circle-fill text-success me-1"></i> Admin Online</div>
        </div>
    </div>
</nav>

<div class="admin-wrapper">
    <div class="sidebar">
        <div class="sidebar-brand d-none d-md-block">
            <img src="../Asset/logo.jpeg" alt="Logo" width="60" height="60" class="rounded-circle mb-2 border border-white shadow">
            <h6 class="m-0 fw-bold">Admin Panel</h6>
        </div>
        <div class="nav flex-column nav-pills mt-3">
            <button class="nav-link active" id="tab-transactions" data-bs-toggle="pill" data-bs-target="#content-transactions">
                <i class="bi bi-receipt me-2"></i> Riwayat Transaksi
            </button>
            <button class="nav-link" id="tab-stock" data-bs-toggle="pill" data-bs-target="#content-stock">
                <i class="bi bi-box-seize me-2"></i> Manajemen Stok
            </button>
            <button class="nav-link" id="tab-report" data-bs-toggle="pill" data-bs-target="#content-report">
                <i class="bi bi-graph-up-arrow me-2"></i> Laporan Penjualan
            </button>
        </div>
        <div class="mt-auto p-3 text-center border-top">
            <small class="text-muted">Sabar Coffee v2.0</small>
        </div>
    </div>

    <main class="main-content">
        <div class="tab-content">
            
            <div class="tab-pane fade show active" id="content-transactions">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold m-0">Riwayat Transaksi</h4>
                    <input type="date" id="filter-date" class="form-control w-auto shadow-sm" onchange="loadTransactions()">
                </div>
                <div class="card">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Antrean</th>
                                    <th>Waktu</th>
                                    <th>Menu</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-list">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="content-stock">
                <h4 class="fw-bold mb-4">Manajemen Stok & Menu</h4>
                <div id="stock-list" class="row g-3">
                    </div>
            </div>

            <div class="tab-pane fade" id="content-report">
                <h4 class="fw-bold mb-4">Laporan Penjualan Harian</h4>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="card p-4 text-center">
                            <small class="text-muted text-uppercase">Total Pendapatan (Periode Ini)</small>
                            <h2 class="fw-bold text-brand mt-2" id="stat-total-revenue">Rp 0</h2>
                        </div>
                    </div>
                </div>
                <div class="card p-4">
                    <div style="height: 350px;">
                        <canvas id="salesChart"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const apiBaseUrl = "https://sakurasao-coffebreakapi.hf.space";
    let myChart = null;

    // Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);

    // Load Transactions
    async function loadTransactions() {
        const date = document.getElementById("filter-date").value;
        const res = await fetch(`${apiBaseUrl}/admin/transactions?date=${date}`);
        const data = await res.json();
        const list = document.getElementById("transaction-list");
        
        list.innerHTML = data.map(o => `
            <tr>
                <td class="fw-bold">#${o.queue_number}</td>
                <td>${new Date(o.created_at).toLocaleTimeString('id-ID')}</td>
                <td><small>${o.order_items.map(it => `${it.quantity}x ${it.products.name}`).join(', ')}</small></td>
                <td class="fw-bold">Rp ${o.total_price.toLocaleString()}</td>
                <td><span class="badge bg-${o.status==='Completed'?'success':(o.status==='Pending'?'warning':'danger')}">${o.status}</span></td>
            </tr>
        `).join('');
    }

    // Load Stock
    async function loadStock() {
        const res = await fetch(`${apiBaseUrl}/menu`);
        const data = await res.json();
        const list = document.getElementById("stock-list");
        
        list.innerHTML = data.map(p => `
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h6 class="fw-bold">${p.name}</h6>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="badge bg-light text-dark">Stok: ${p.stock}</span>
                            <div class="input-group input-group-sm w-50">
                                <input type="number" class="form-control" id="add-${p.id}" placeholder="+/-">
                                <button class="btn btn-brand text-white" onclick="updateStock(${p.id})">Update</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function updateStock(id) {
        const val = document.getElementById(`add-${id}`).value;
        if(!val) return;
        await fetch(`${apiBaseUrl}/admin/update-stock/${id}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({stock: parseInt(val)})
        });
        loadStock();
    }

    async function loadSalesReport() {
        const res = await fetch(`${apiBaseUrl}/admin/sales-report`);
        const result = await res.json();
        document.getElementById("stat-total-revenue").innerText = `Rp ${result.total_period.toLocaleString()}`;
        
        const ctx = document.getElementById("salesChart").getContext("2d");
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: "line",
            data: {
                labels: result.labels,
                datasets: [{
                    label: "Pendapatan (Rp)",
                    data: result.data,
                    borderColor: "#c85a2e",
                    backgroundColor: "rgba(200, 90, 46, 0.1)",
                    fill: true, tension: 0.4, borderWidth: 3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // Navigasi
    document.getElementById("tab-transactions").addEventListener("click", loadTransactions);
    document.getElementById("tab-stock").addEventListener("click", loadStock);
    document.getElementById("tab-report").addEventListener("click", () => setTimeout(loadSalesReport, 200));

    // Start
    loadTransactions();
</script>
</body>
</html>
